name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.5)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/upload.jks

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VER="${TAG#v}"
          MAJOR="${VER%%.*}"
          BUILD_NUM="${VER#*.}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUM" >> "$GITHUB_OUTPUT"

      - name: Build release APKs & AABs
        env:
          RELEASE_STORE_FILE: ../keystore/upload.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew \
            assembleProductionRelease assembleClosedTestingRelease assembleInternalTestingRelease \
            bundleProductionRelease bundleClosedTestingRelease bundleInternalTestingRelease \
            -PMAJOR_VERSION=${{ steps.version.outputs.major }} \
            -PBUILD_NUMBER=${{ steps.version.outputs.build_number }}

      - name: Rename artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          for flavor in production closedTesting internalTesting; do
            cp "app/build/outputs/apk/${flavor}/release/app-${flavor}-release.apk" \
               "app/build/outputs/apk/${flavor}/release/metronome-${flavor}-${TAG}.apk"
            cp "app/build/outputs/bundle/${flavor}Release/app-${flavor}-release.aab" \
               "app/build/outputs/bundle/${flavor}Release/metronome-${flavor}-${TAG}.aab"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          retention-days: 7
          path: |
            app/build/outputs/apk/*/release/metronome-*.apk
            app/build/outputs/bundle/*Release/*.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/*/release/metronome-*.apk
            app/build/outputs/bundle/*Release/metronome-*.aab

  deploy-internal:
    needs: build
    runs-on: ubuntu-latest
    environment: play-internal
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Upload to Play Store — Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ieshaan12.metronome
          releaseFiles: app/build/outputs/bundle/internalTestingRelease/app-internalTesting-release.aab
          track: internal
          status: completed

  deploy-closed:
    needs: deploy-internal
    runs-on: ubuntu-latest
    environment: play-closed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Upload to Play Store — Closed Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ieshaan12.metronome
          releaseFiles: app/build/outputs/bundle/closedTestingRelease/app-closedTesting-release.aab
          track: alpha
          status: completed

  deploy-production:
    needs: deploy-closed
    runs-on: ubuntu-latest
    environment: play-production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Upload to Play Store — Production
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ieshaan12.metronome
          releaseFiles: app/build/outputs/bundle/productionRelease/app-production-release.aab
          track: production
          status: completed
