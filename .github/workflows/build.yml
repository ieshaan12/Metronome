name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew assembleDebug

      - run: ./gradlew lintDebug

      - run: ./gradlew test

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Create dummy keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/ci-release.jks \
            -alias ci \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass android -keypass android \
            -dname "CN=CI,O=CI"
          printf '%s\n' \
            'RELEASE_STORE_FILE=../keystore/ci-release.jks' \
            'RELEASE_STORE_PASSWORD=android' \
            'RELEASE_KEY_ALIAS=ci' \
            'RELEASE_KEY_PASSWORD=android' > local.properties

      - run: ./gradlew assembleRelease

      - run: ./gradlew lintVitalRelease
