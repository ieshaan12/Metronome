name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew assembleDevDebug

      - run: ./gradlew lintDevDebug

      - run: ./gradlew testDevDebugUnitTest

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Create dummy keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/ci-release.jks \
            -alias ci \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass android -keypass android \
            -dname "CN=CI,O=CI"

      - name: Build release APK
        env:
          RELEASE_STORE_FILE: ../keystore/ci-release.jks
          RELEASE_STORE_PASSWORD: android
          RELEASE_KEY_ALIAS: ci
          RELEASE_KEY_PASSWORD: android
        run: ./gradlew assembleDevRelease

      - run: ./gradlew lintVitalDevRelease
